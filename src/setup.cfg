[isort]
profile = black
line_length = 100
skip =
    .venv

[flake8]
max-line-length = 100
max-complexity = 15
ignore =
    E203
    E402
    E501
    W503
exclude =
    .git,
    .venv,
    __pycache__
per-file-ignores =
    main.py: E402

[mypy]
python_version = 3.10
files = .
exclude = ^tests/
ignore_missing_imports = True
warn_unused_ignores = True
check_untyped_defs = True
show_error_codes = True
